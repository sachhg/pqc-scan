# CI for pqc-scan itself: run the test suite across supported Pythons and
# smoke-test the CLI by scanning the repo's own fixtures.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run test suite (with coverage)
        run: python -m pytest -q --cov=pqcscan --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

      - name: Smoke-test the CLI on Windows
        run: pqc-scan scan tests/fixtures --output sarif --output-file pqc-scan.sarif

  smoke-cli:
    name: Smoke-test the CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Scan fixtures and emit SARIF
        run: pqc-scan scan tests/fixtures --output sarif --output-file pqc-scan.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-scan-sarif
          path: pqc-scan.sarif
